name: release-readiness

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  release-readiness:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run release-readiness gate
        shell: bash
        run: python plugins/agentiux-dev/scripts/release_readiness.py run --repo-root . --smoke-runs 3
